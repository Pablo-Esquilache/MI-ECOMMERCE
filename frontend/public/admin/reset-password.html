<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; display: flex; align-items: center; justify-content: center; background: #f4f6f8; }
        .login-container { width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; margin: auto; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 12px; background: #2C3E50; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2 style="margin-bottom: 20px;">Crear Nueva Contraseña</h2>
            
            <form id="reset-form">
                <div class="form-group">
                    <label>Nueva Contraseña</label>
                    <input type="password" id="pass1" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Repetir Contraseña</label>
                    <input type="password" id="pass2" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" id="btn-submit">Guardar y Entrar</button>
            </form>
            
            <div id="error-msg" style="color: red; margin-top: 15px; display: none;"></div>
            <div id="success-msg" style="color: #27ae60; margin-top: 15px; display: none;"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('error-msg').innerText = 'Falta el Token de seguridad en la URL.';
            document.getElementById('error-msg').style.display = 'block';
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass1 = document.getElementById('pass1').value;
            const pass2 = document.getElementById('pass2').value;
            const errorbox = document.getElementById('error-msg');
            const successbox = document.getElementById('success-msg');
            const btn = document.getElementById('btn-submit');

            errorbox.style.display = 'none';
            
            if(pass1 !== pass2) {
                errorbox.innerText = "Las contraseñas no coinciden.";
                errorbox.style.display = 'block';
                return;
            }

            btn.innerHTML = 'Guardando...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: pass1 })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successbox.innerText = data.message + ' Redirigiendo...';
                    successbox.style.display = 'block';
                    document.getElementById('reset-form').style.display = 'none';
                    setTimeout(() => window.location.href = 'login.html', 2500);
                } else {
                    errorbox.innerText = data.error;
                    errorbox.style.display = 'block';
                    btn.innerHTML = 'Guardar y Entrar';
                    btn.disabled = false;
                }
            } catch(e) {
                errorbox.innerText = 'Error de red';
                errorbox.style.display = 'block';
                btn.innerHTML = 'Guardar y Entrar';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
