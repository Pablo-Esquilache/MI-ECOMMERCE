<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f6f8; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 12px; background: #2C3E50; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .back-link { display: block; margin-top: 15px; color: #3498db; text-decoration: none; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2 style="margin-bottom: 10px;">Recuperar Acceso</h2>
            <p style="color: #7f8c8d; margin-bottom: 20px; font-size: 14px;">Ingresa el email vinculado a tu cuenta de Administrador. Te enviaremos un enlace seguro.</p>
            
            <form id="forgot-form">
                <div class="form-group">
                    <label>Email de Administrador</label>
                    <input type="email" id="forgot-email" required>
                </div>
                <button type="submit" class="btn btn-primary" id="btn-submit">Enviar Enlace</button>
            </form>
            
            <div id="error-msg" style="color: red; margin-top: 15px; display: none;"></div>
            <div id="success-msg" style="color: #27ae60; margin-top: 15px; display: none;"></div>
            
            <a href="login.html" class="back-link">Volver al Login</a>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const email = document.getElementById('forgot-email').value;
            const errorbox = document.getElementById('error-msg');
            const successbox = document.getElementById('success-msg');
            
            btn.innerHTML = 'Enviando...';
            btn.disabled = true;
            errorbox.style.display = 'none';
            successbox.style.display = 'none';

            try {
                const res = await fetch('/api/admin/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successbox.innerText = data.message;
                    successbox.style.display = 'block';
                    document.getElementById('forgot-email').value = '';
                } else {
                    errorbox.innerText = data.error;
                    errorbox.style.display = 'block';
                }
            } catch(err) {
                errorbox.innerText = 'Error de red al intentar conectar.';
                errorbox.style.display = 'block';
            } finally {
                btn.innerHTML = 'Enviar Enlace';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
